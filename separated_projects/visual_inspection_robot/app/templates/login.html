"{% extends 'base.html' %}\n\n{% block content %}\n<div class=\"auth-box\">\n    <div class=\"auth-title\">Operator Log In</div>\n    \n    <form action=\"{{ url_for('main.login') }}\" method=\"POST\">\n        {% if form and 'auth' in form.errors %}\n            <div class=\"flash-msg danger\" style=\"padding: 8px; font-size: 0.75rem; margin-bottom: 12px;\">{{ form.errors['auth'] }}</div>\n        {% endif %}\n        \n        <div class=\"form-group\">\n            <label for=\"username\">Operator Username</label>\n            <input type=\"text\" id=\"username\" name=\"username\" class=\"form-input\" placeholder=\"e.g. paperclip\" required value=\"{% if form %}{{ form.username }}{% endif %}\">\n        </div>\n        \n        <div class=\"form-group\">\n            <label for=\"password\">Security Password</label>\n            <input type=\"password\" id=\"password\" name=\"password\" class=\"form-input\" placeholder=\"Enter password\" required>\n        </div>\n        \n        <button type=\"submit\" class=\"btn-auth\">Verify & Access</button>\n    </form>\n    \n    <div class=\"auth-footer\">\n        New operator? <a href=\"{{ url_for('main.register') }}\">Create an account here</a>\n    </div>\n</div>\n{% endblock %}\n"
